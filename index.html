<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* RESET */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ul {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        body {
            font-family: 'Parisienne', cursive;
            background-image: url(pascal-debrunner-8xkImX3so8U-unsplash.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
        }

        .header{
            background-color: rgba(19, 22, 26, 0.6); 
            font-size: 25px;
            color: white;
        }

        .header_content {
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1650px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .logo_img {
            display: block;
            height: 70px;
            width: 190px;
        }

        .nav_list {
            display: flex;
            column-gap: 40px;
        }

        .nav_item {
            display: flex;
            align-items: center;
        }

        .nav_link {
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .nav_link:hover, .nav_link:focus {
            color: rgb(123, 158, 133);
        }

        .btn {
            background-color: rgb(77, 87, 133);
            color: rgb(255, 255, 255);
            padding: 7px 15px;
            border-radius: 100px;
            font-size: 19px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: rgb(159, 194, 151);
            color: rgb(216, 255, 227);
        }

        /*media query*/
        @media (max-width: 650px) {
            .header_content {
                flex-direction: column;
                height: auto;
                padding: 25px 0;
                row-gap: 15px;
            }

            .nav_list {
                flex-direction: column;
                column-gap: 20px;
            }
        }


        .container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .side {
            flex: 30%;
            background-color: rgba(19, 22, 26, 0.6);
            padding: 20px;
            text-align: center;
            font-size: 30px;
            color: rgb(231, 229, 253);
        }

        .main {
            flex: 70%;
            background-color: rgba(19, 22, 26, 0.6);
            padding: 20px;
        }

    </style>
</head>
<body>
    <header class="header">
        <div class="header_content">
           <a href="index.html">
               <img src="bunnysign.png" class="logo_img">
           </a>
           <nav class="nav">
             <ul class="nav_list">
               <li class="nav_item">
                  <a href="#" class="nav_link">contacts</a>
               </li>
               <li class="nav_item">
                  <a href="#" class="nav_link">projects</a>
               </li>
               <li class="nav_item">
                  <a href="straykids.html" class="btn">Stray kids</a>
               </li>
             </ul>
           </nav>
        </div>

    </header>
        
    <div class="container">
        <div class="side">
            <h1>Hello, I'm Evolet, a Future Software Developer!</h1>
        </div>
    </div>

    <div class="main">
        <h1>under construction</h1>
        <p>text</p>
    </div>
       
    
</body>
</html>
