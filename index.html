<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        ul {
            list-style: none;
            position: sticky;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        body {
            font-family: 'Parisienne', cursive;
            background-image: url(pascal-debrunner-8xkImX3so8U-unsplash.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
        }
        /*header and nav bar*/
        .header{
            background-color: rgba(19, 22, 26, 0.685); 
            font-size: 25px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 0;
        }

        .header_content {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1650px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .logo_img {
            display: block;
            height: 70px;
            width: 190px;
        }

        .nav {
            height: 30px;
        }

        .nav_list {
            display: flex;
            column-gap: 40px;
        }

        .nav_item {
            display: flex;
            align-items: center;
        }

        .nav_link {
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .nav_link:hover, .nav_link:focus {
            color: rgb(146, 239, 255);
        }

        .btn {
            background-color: rgb(76, 96, 184);
            color: rgb(255, 255, 255);
            padding: 7px 15px;
            border-radius: 100px;
            font-size: 19px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: rgb(146, 239, 255);
            color: rgb(0, 16, 105);
        }

        /*animation for the text intro*/
        @keyframes fade-inout{
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .intro {
            animation: fade-inout 4s ease-in-out;
            font-size: 40px;
            text-align: center;
            height: 870px;
            background-color: rgba(12, 45, 77, 0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background-image: url(swirls.png), url(swirls2.png);
            background-repeat: no-repeat, no-repeat;
            background-size: 350px 600px, 240px 420px;
            background-position: -60px 380px, 1660px 10px;
        }

        h1 {
            margin-top: 350px;
            color: azure; 
            text-shadow: 2px 2px 4px rgba(124, 177, 255, 0.959);
        }

        .main {
            flex: 70%;
            background-color: rgba(19, 22, 26, 0.6);
            font-size: 30px;
            color: rgb(229, 233, 253);
            text-align: center;
        }
        /*profile, achievements, and projects sections*/
        .profile, .achievements , .projects {
            background-color: rgba(9, 33, 58, 0.308);
            color: rgb(229, 233, 253);
            font-size: 30px;
            height: 800px;
            margin: 0px;
            
        }

        .contacts {
            background-color: rgba(29, 71, 116, 0.555);
            padding: 30px;
            align-items: center;
            display: flex;
            justify-content: center;

        }
        /*conact me section from*/
        .contac-container {
            background-color: rgba(34, 89, 148, 0.555);
            color: rgb(229, 233, 253);
            text-align: center;
        }

        .contac-container h2{
            font-size: 30px;
            padding: 50px;
            font-size: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="text"], input[type="email"], textarea {
            width: 650px;
            height: 40px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            text-align: center;
        }

        input:focus, textarea:focus {
            outline: none;
            border: #5977ff solid 2px;
            box-shadow: 0 0 10px rgba(20, 49, 194, 0.8);
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            background-color: rgb(76, 96, 184);
            color: rgb(255, 255, 255);
            padding: 5px 40px;
            border-radius: 100px;
            font-size: 19px;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            margin: 20px;
            font-family: 'Parisienne', cursive;
        }

        button:hover {
            background-color: rgb(146, 239, 255);
            color: rgb(0, 16, 105);
        }

        label {
            font-size: 25px;
            margin-bottom: 10px;
        }

        hr {
            width: 50%;
            margin: 0 auto 40px auto;
            border: 1px solid rgb(229, 233, 253);
        }

        .links {
            display: flex;
            column-gap: 30px;
        }

        h3 {
            color: rgb(249, 250, 255);
            font-size: 20px;
            margin-left: 200px;
        }

        .links img {
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .links img:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .copyright {
            background-color: rgba(19, 22, 26, 0.89);
            color: white;
            text-align: center;
            padding: 30px;
        }

        /*media query*/
        @media (max-width: 650px) {
            .header_content {
                flex-direction: column;
                padding: 30px 0;
                row-gap: 10px;
            }

            .nav_list {
                margin-top: 5x;
                flex-direction: row;
                column-gap: 10px;
            }

            .intro {
                font-size: 17px;
                height: 500px;
                background-size: 280px 330px, 140px 260px;
                background-position: -60px 230px, 450px 10px;
            }

            h1 {
                margin-top: 170px;
            }

            .logo_img {
                height: 50px;
                width: 135px
            }
        }

    </style>
</head>
<body>
    <header class="header">
        <div class="header_content">
           <a href="#Home">
               <img src="bunnysign.png" class="logo_img">
           </a>
           <nav class="nav">
             <ul class="nav_list">
                <li class="nav_item">
                  <a href="#projects" class="nav_link">projects</a>
               </li>
               <li class="nav_item">
                  <a href="#achievements" class="nav_link">achievements</a>
               </li>
               <li class="nav_item">
                  <a href="#contact" class="nav_link">contacts</a>
               </li>
               <li class="nav_item">
                  <a href="#profile" class="btn">Profile</a>
               </li>
             </ul>
           </nav>
        </div>

    </header>
        
    <div class="intro" id="Home">
        <h1>Hello, I'm Evolet a Future Software Developer!</h1>
    </div>
    
    <div class="projects" id="projects">
        <h2>projects</h2>
        <p>text</p>
    </div>
    <div class="achievements" id="achievements">
        <h2>achievements</h2>
        <p>text</p>
    </div>
    <div class="profile" id="profile">
        <h2>Profile</h2>
        <p>text</p>
    </div>
    <div class="contac-container" id="contact">
        <h2 style="font-size: 55px;">Contact Me</h2>
        <hr>
        <form>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="message"></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
    <div class="contacts">
        <div class ="links">
            <a href="https://www.linkedin.com/in/evolet-gutierrez-0638753a7/" target="_blank" class="links">
                <img src="in.png" style="height: 65px; width: 65px; margin-right: 20px;">
            </a>
            <a href="https://github.com/till620-hue" target="_blank" class="links">
                <img src="githublogo.png" style="height: 70px; width: 75px; margin-right: 20px;">
            </a>
            <a href="https://mail.google.com/mail/u/0/#inbox?compose=GTvVlcSKjDNJbmQgLZbkKwBMHNJQJpJdXljDzbxKtCKTCvpxDVMbShTpGQPTLrcWTRSPnnGWRxqKp" target="_blank" class="links">
                <img src="emaillogo.png" style="height: 75px; width: 75px;">
            </a>
        </div>
        <h3 class="phone"><img src="phonelogo.png" style="height: 30px; width: 30px; margin-right: 10px;"> 602-727-0872</h3>
    </div>
    <div class="copyright">
        <p>Copyright © 2026 Evolet Gutierrez. All rights reserved.</p>
    </div>   
</body>
</html>
