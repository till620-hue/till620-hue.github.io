<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* RESET */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ul {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        body {
            font-family: 'Parisienne', cursive;
            background-image: url(pascal-debrunner-8xkImX3so8U-unsplash.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
        }

        .header{
            background-color: rgba(19, 22, 26, 0.6); 
            font-size: 25px;
            color: white;
        }

        .header_content {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1650px;
            margin: 0 auto;
            padding: 0 30px;
        }
        
        .logo {

        }

        .logo_img {
            display: block;
            height: 70px;
            width: 270px;
        }

        .nav_list {
            display: flex;
            column-gap: 40px;
        }

        .nav_item {
            display: flex;
            align-items: center;
        }

        .nav_link {
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .nav_link:hover, .nav_link:focus {
            color: rgb(103, 111, 255);
        }


        .container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.1);
        }

        .side {
            flex: 30%;
            background-color: rgba(255,232,232, 0.5);
            padding: 20px;
        }

        .main {
            flex: 70%;
            background-color: rgb(228, 197, 197);
            padding: 20px;
        }

    </style>
</head>
<body>
    <header class="header">
        <div class="header_content">
           <a href="index.html" class"logo">
               <img src="bunnysign.png" class="logo_img">
           </a>
           <nav class="nav">
             <ul class="nav_list">
               <li class="nav_item">
                  <a href="#" class="nav_link">contacts</a>
               </li>
               <li class="nav_item">
                  <a href="#" class="nav_link">projects</a>
               </li>
               <li class="nav_item">
                  <a href="straykids.html" class="btn">Stray kids</a>
               </li>
             </ul>
           </nav>
        </div>

    </header>
        
    <div class="container">
        <div class="side">
            <h1>Welcome, I'm Evolet, a Future Software Developer!</h1>
        </div>
    </div>

    <div class="main">
        <h1>under construction</h1>
        <p>text</p>
    </div>
       
    
</body>
</html>
