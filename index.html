<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <title>Portfolio</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* RESET */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        ul {
            list-style: none;
            position: sticky;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        body {
            font-family: 'Parisienne', cursive;
            background-image: url(pascal-debrunner-8xkImX3so8U-unsplash.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            background-position: center center;
        }

        .header{
            background-color: rgba(19, 22, 26, 0.685); 
            font-size: 25px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 0;
        }

        .header_content {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1650px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .logo_img {
            display: block;
            height: 70px;
            width: 190px;
        }

        .nav {
            height: 30px;
        }

        .nav_list {
            display: flex;
            column-gap: 40px;
        }

        .nav_item {
            display: flex;
            align-items: center;
        }

        .nav_link {
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .nav_link:hover, .nav_link:focus {
            color: rgb(146, 239, 255);
        }

        .btn {
            background-color: rgb(76, 96, 184);
            color: rgb(255, 255, 255);
            padding: 7px 15px;
            border-radius: 100px;
            font-size: 19px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: rgb(146, 239, 255);
            color: rgb(0, 16, 105);
        }

        /*animation for the text*/
        @keyframes fade-inout{
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        .intro {
            animation: fade-inout 4s ease-in-out;
            font-size: 40px;
            text-align: center;
            height: 870px;
            background-color: rgba(12, 45, 77, 0.3);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background-image: url(swirls.png), url(swirls2.png);
            background-repeat: no-repeat, no-repeat;
            background-size: 350px 600px, 240px 420px;
            background-position: -60px 380px, 1660px 10px;
        }

        h1 {
            margin-top: 350px;
            color: azure; 
            text-shadow: 2px 2px 4px rgba(124, 177, 255, 0.959);
        }

        .side {
            flex: 30%;
            background-color: rgba(19, 22, 26, 0.6);
            padding: 20px;
            text-align: center;
            font-size: 30px;
            color: rgb(229, 233, 253);
        }

        .main {
            flex: 70%;
            background-color: rgba(19, 22, 26, 0.6);
            font-size: 30px;
            color: rgb(229, 233, 253);
            text-align: center;
        }

        /*media query*/
        @media (max-width: 650px) {
            .header_content {
                flex-direction: column;
                padding: 30px 0;
                row-gap: 10px;
            }

            .nav_list {
                margin-top: 5x;
                flex-direction: row;
                column-gap: 10px;
            }

            .intro {
                font-size: 17px;
                height: 500px;
                background-size: 280px 330px, 140px 320px;
                background-position: -60px 230px, 490px 10px;
            }

            h1 {
                margin-top: 170px;
            }

            .logo_img {
                height: 50px;
                width: 135px
            }
        }

    </style>
</head>
<body>
    <header class="header">
        <div class="header_content">
           <a href="#Home">
               <img src="bunnysign.png" class="logo_img">
           </a>
           <nav class="nav">
             <ul class="nav_list">
                <li class="nav_item">
                  <a href="#projects" class="nav_link">projects</a>
               </li>
               <li class="nav_item">
                  <a href="#achievements" class="nav_link">achievements</a>
               </li>
               <li class="nav_item">
                  <a href="#contact" class="nav_link">contacts</a>
               </li>
               <li class="nav_item">
                  <a href="#profile" class="btn">Profile</a>
               </li>
             </ul>
           </nav>
        </div>

    </header>
        
    <div class="intro" id="Home">
        <h1>Hello, I'm Evolet, a Future Software Developer!</h1>
    </div>
    
    <div class="container" id="projects">
        <div class="side">
        <h1>infromation</h1>
        <p>text</p>
        </div>
        <div class="main">
         <h1>projects</h1>
         <p>text</p>
        </div>
    </div>
    <div class="achievements" id="achievements">
        <h1>achievements</h1>
        <p>text</p>
    </div>
    <div class="contact" id="contact">
        <h1>contact</h1>
        <p>text</p>
    </div>
    <div class="Profile" id="profile">
        <h1>Profile
        </h1>
        <p>text</p>
    </div>
    <div class="copyright">
        <p>Copyright © 2024 Evolet Gutierrez. All rights reserved.</p>
    </div>

       
    
</body>
</html>
